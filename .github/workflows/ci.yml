name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: src

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os, pathlib
          key = os.environ['VPS_SSH_KEY']
          lines = [line.strip() for line in key.splitlines() if line.strip()]
          cleaned = '\n'.join(lines) + '\n'
          p = pathlib.Path.home() / '.ssh/deploy_key'
          p.write_text(cleaned)
          p.chmod(0o600)
          "
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cd ~/MovieTrace && git pull origin main'

      - name: Sync secrets to VPS
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_APP_TOKEN: ${{ secrets.FEISHU_BASE_APP_TOKEN }}
          FEISHU_DISCOVERY_TABLE_ID: ${{ secrets.FEISHU_DISCOVERY_TABLE_ID }}
          FEISHU_GAP_TABLE_ID: ${{ secrets.FEISHU_GAP_TABLE_ID }}
          FEISHU_DOC_FOLDER_TOKEN: ${{ secrets.FEISHU_DOC_FOLDER_TOKEN }}
          FEISHU_NOTIFY_CHAT_ID: ${{ secrets.FEISHU_NOTIFY_CHAT_ID }}
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          OMDB_API_KEY_2: ${{ secrets.OMDB_API_KEY_2 }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          FLIXPATROL_API_KEY: ${{ secrets.FLIXPATROL_API_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, tempfile, pathlib

          updates = {
              "feishu": {
                  "app_id": os.environ["FEISHU_APP_ID"],
                  "app_secret": os.environ["FEISHU_APP_SECRET"],
                  "base_app_token": os.environ["FEISHU_BASE_APP_TOKEN"],
                  "discovery_table_id": os.environ["FEISHU_DISCOVERY_TABLE_ID"],
                  "gap_table_id": os.environ["FEISHU_GAP_TABLE_ID"],
                  "doc_folder_token": os.environ["FEISHU_DOC_FOLDER_TOKEN"],
                  "notify_chat_id": os.environ["FEISHU_NOTIFY_CHAT_ID"],
              },
              "tmdb": {"api_read_access_token": os.environ["TMDB_API_TOKEN"]},
              "omdb": {"api_keys": [k for k in [os.environ["OMDB_API_KEY"], os.environ.get("OMDB_API_KEY_2", "")] if k]},
              "trakt": {"client_id": os.environ["TRAKT_CLIENT_ID"]},
              "flixpatrol": {"api_key": os.environ["FLIXPATROL_API_KEY"]},
          }

          payload = json.dumps(updates, ensure_ascii=False)
          host = os.environ["VPS_HOST"]
          user = os.environ["VPS_USER"]

          script = f"""
          set -e
          mkdir -p ~/.config/movietrace
          python3 - <<'EOF'
          import json, pathlib

          path = pathlib.Path.home() / ".config/movietrace/secrets.json"
          existing = json.loads(path.read_text()) if path.exists() else {{}}

          def deep_merge(base, override):
              result = dict(base)
              for k, v in override.items():
                  if k in result and isinstance(result[k], dict) and isinstance(v, dict):
                      result[k] = deep_merge(result[k], v)
                  else:
                      result[k] = v
              return result

          updates = {payload}
          merged = deep_merge(existing, updates)
          path.write_text(json.dumps(merged, indent=2, ensure_ascii=False))
          path.chmod(0o600)
          print("secrets.json updated")
          EOF
          """

          result = subprocess.run(
              ["ssh", "-i", str(pathlib.Path.home() / ".ssh/deploy_key"), f"{user}@{host}", script],
              capture_output=True, text=True
          )
          print(result.stdout)
          if result.returncode != 0:
              print(result.stderr)
              raise SystemExit(result.returncode)
          PYEOF

  notify:
    needs: [test, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_NOTIFY_CHAT_ID: ${{ secrets.FEISHU_NOTIFY_CHAT_ID }}
      TEST_RESULT: ${{ needs.test.result }}
      DEPLOY_RESULT: ${{ needs.deploy.result }}
      COMMIT_MSG: ${{ github.event.head_commit.message }}
      COMMIT_SHA: ${{ github.sha }}
      RUN_ID: ${{ github.run_id }}
      REPO: ${{ github.repository }}

    steps:
      - name: Send Feishu notification
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          app_id = os.environ["FEISHU_APP_ID"]
          app_secret = os.environ["FEISHU_APP_SECRET"]
          chat_id = os.environ["FEISHU_NOTIFY_CHAT_ID"]
          test_result = os.environ["TEST_RESULT"]
          deploy_result = os.environ["DEPLOY_RESULT"]
          commit_msg = os.environ["COMMIT_MSG"].splitlines()[0][:60]
          commit_sha = os.environ["COMMIT_SHA"][:7]
          run_id = os.environ["RUN_ID"]
          repo = os.environ["REPO"]

          token_resp = urllib.request.urlopen(urllib.request.Request(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              data=json.dumps({"app_id": app_id, "app_secret": app_secret}).encode(),
              headers={"Content-Type": "application/json"},
              method="POST"
          ))
          token = json.loads(token_resp.read())["tenant_access_token"]

          overall = "success" if test_result == "success" and deploy_result == "success" else "failure"
          icon = "✅" if overall == "success" else "❌"
          status_text = "部署成功" if overall == "success" else f"失败（test:{test_result} deploy:{deploy_result}）"
          text = f"{icon} MovieTrace {status_text}\n{commit_sha} {commit_msg}\nhttps://github.com/{repo}/actions/runs/{run_id}"

          req = urllib.request.Request(
              "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id",
              data=json.dumps({"receive_id": chat_id, "msg_type": "text", "content": json.dumps({"text": text})}).encode(),
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {token}"},
              method="POST"
          )
          result = json.loads(urllib.request.urlopen(req).read())
          print(f"Feishu notify: code={result.get('code')} msg={result.get('msg')}")
          PYEOF
