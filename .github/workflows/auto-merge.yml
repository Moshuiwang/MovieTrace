name: Auto-merge PR for @moshuiwang

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge with Squash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # 获取关联的 PR
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/$WORKFLOW_RUN_ID" \
            --jq '.pull_requests[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "❌ 无法找到关联的 PR"
            exit 0
          fi

          # 检查 PR 创建者是否为 @moshuiwang
          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" \
            --jq '.user.login')

          if [ "$PR_AUTHOR" != "moshuiwang" ]; then
            echo "⏭️  跳过：PR 不是由 @moshuiwang 创建（作者：$PR_AUTHOR）"
            exit 0
          fi

          # 检查是否可以合并
          IS_MERGEABLE=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" \
            --jq '.mergeable')

          if [ "$IS_MERGEABLE" != "true" ]; then
            echo "⚠️  无法合并：存在冲突或其他阻止条件"
            exit 0
          fi

          # 执行 Squash 合并
          echo "✅ 合并 PR #$PR_NUMBER (作者：@$PR_AUTHOR)"
          gh pr merge "$PR_NUMBER" \
            --squash \
            --auto \
            --delete-branch \
            --body "自动合并 by CI"

          echo "✨ PR #$PR_NUMBER 已合并（Squash 策略）"
