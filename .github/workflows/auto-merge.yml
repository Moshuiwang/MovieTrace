name: Auto-merge PR for @moshuiwang

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge with Squash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # 获取关联的 PR
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/$WORKFLOW_RUN_ID" \
            --jq '.pull_requests[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "❌ 无法找到关联的 PR"
            exit 0
          fi

          # 检查 PR 创建者是否为 @moshuiwang
          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" \
            --jq '.user.login')

          if [ "${PR_AUTHOR,,}" != "moshuiwang" ]; then
            echo "⏭️  跳过：PR 不是由 @moshuiwang 创建（作者：$PR_AUTHOR）"
            exit 0
          fi

          # 执行 Squash 合并（gh pr merge --squash 同步执行，不用 --auto 避免异步延迟）
          echo "✅ 合并 PR #$PR_NUMBER (作者：@$PR_AUTHOR)"
          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --body "自动合并 by CI"

          echo "✨ PR #$PR_NUMBER 已合并（Squash 策略）"

          # 合并后触发 main 分支 CI 以执行 deploy（GITHUB_TOKEN merge 不触发 push 事件）
          sleep 3
          echo "🚀 触发 main 分支 CI deploy..."
          gh workflow run CI --ref main
          echo "✅ CI dispatch 已发送"
