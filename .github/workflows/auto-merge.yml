name: Auto-merge PR for @moshuiwang

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write
      contents: write
      actions: write
      workflows: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge with Squash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # 获取关联的 PR
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/$WORKFLOW_RUN_ID" \
            --jq '.pull_requests[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "❌ 无法找到关联的 PR"
            exit 0
          fi

          # 检查 PR 创建者是否为 @moshuiwang
          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" \
            --jq '.user.login')

          if [ "${PR_AUTHOR,,}" != "moshuiwang" ]; then
            echo "⏭️  跳过：PR 不是由 @moshuiwang 创建（作者：$PR_AUTHOR）"
            exit 0
          fi

          # 开启 auto-merge（分支保护规则要求，不能直接同步合并）
          echo "✅ 开启 auto-merge PR #$PR_NUMBER (作者：@$PR_AUTHOR)"
          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --body "自动合并 by CI" \
            --auto

          # 轮询等待 PR 实际合并（最多 60s）
          echo "⏳ 等待 PR 合并..."
          STATE=""
          for i in $(seq 1 20); do
            sleep 3
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state' 2>/dev/null)
            if [ "$STATE" = "MERGED" ]; then
              break
            fi
          done

          if [ "$STATE" != "MERGED" ]; then
            echo "⚠️ PR 未在 60s 内合并，跳过 CI dispatch"
            exit 0
          fi

          echo "✨ PR #$PR_NUMBER 已合并（Squash 策略）"

          # 合并后触发 main 分支 CI 以执行 deploy（auto-merge 不触发 push 事件）
          sleep 3
          echo "🚀 触发 main 分支 CI deploy..."
          gh workflow run CI --ref main
          echo "✅ CI dispatch 已发送"
