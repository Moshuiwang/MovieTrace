name: Manual Pipeline Rerun

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage to run"
        type: choice
        options: [export, discover, sync, all]
        default: export
      days:
        description: "Days to cover (export stage only)"
        type: string
        default: "1"
      dry_run:
        description: "Dry run — no writes to DB or Feishu"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: manual-pipeline-${{ github.event.inputs.stage }}
  cancel-in-progress: false

jobs:
  rerun:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate inputs
        env:
          DAYS: ${{ github.event.inputs.days }}
        run: |
          if ! echo "$DAYS" | grep -qE '^[0-9]{1,3}$'; then
            echo "::error::days must be 1-3 digits, got: $DAYS"
            exit 1
          fi

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os, pathlib
          key = os.environ['VPS_SSH_KEY']
          lines = [line.strip() for line in key.splitlines() if line.strip()]
          cleaned = '\n'.join(lines) + '\n'
          p = pathlib.Path.home() / '.ssh/deploy_key'
          p.write_text(cleaned)
          p.chmod(0o600)
          "
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run stage on production
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          STAGE: ${{ github.event.inputs.stage }}
          DAYS: ${{ github.event.inputs.days }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash <<REMOTE
          set -e
          cd ~/MovieTrace
          export TZ='Asia/Shanghai'
          source .venv/bin/activate
          RUN_DATE=\$(date +%Y-%m-%d)
          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then DRY_FLAG="--dry-run"; fi

          case "$STAGE" in
            export)
              PYTHONPATH=src python -m movietrace.cli export-recommendations --days "$DAYS" \$DRY_FLAG
              ;;
            discover)
              PYTHONPATH=src python -m movietrace.cli daily-discover \$DRY_FLAG
              ;;
            sync)
              PYTHONPATH=src python -m movietrace.cli sync-feishu-table \
                --source reports/latest.json --date "\$RUN_DATE" \$DRY_FLAG
              PYTHONPATH=src python -m movietrace.cli sync-feishu-doc \
                --source reports/latest.md --title "MovieTrace 每日发现 \$RUN_DATE" \$DRY_FLAG
              ;;
            all)
              PYTHONPATH=src python -m movietrace.cli daily-discover \$DRY_FLAG
              PYTHONPATH=src python -m movietrace.cli export-recommendations --days "$DAYS" \$DRY_FLAG
              PYTHONPATH=src python -m movietrace.cli sync-feishu-table \
                --source reports/latest.json --date "\$RUN_DATE" \$DRY_FLAG
              PYTHONPATH=src python -m movietrace.cli sync-feishu-doc \
                --source reports/latest.md --title "MovieTrace 每日发现 \$RUN_DATE" \$DRY_FLAG
              ;;
          esac
          REMOTE

  notify:
    needs: rerun
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_NOTIFY_CHAT_ID: ${{ secrets.FEISHU_NOTIFY_CHAT_ID }}
      RERUN_RESULT: ${{ needs.rerun.result }}
      STAGE: ${{ github.event.inputs.stage }}
      DAYS: ${{ github.event.inputs.days }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUN_ID: ${{ github.run_id }}
      REPO: ${{ github.repository }}

    steps:
      - name: Send Feishu notification
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          app_id = os.environ["FEISHU_APP_ID"]
          app_secret = os.environ["FEISHU_APP_SECRET"]
          chat_id = os.environ["FEISHU_NOTIFY_CHAT_ID"]
          rerun_result = os.environ["RERUN_RESULT"]
          stage = os.environ["STAGE"]
          days = os.environ["DAYS"]
          dry_run = os.environ["DRY_RUN"]
          run_id = os.environ["RUN_ID"]
          repo = os.environ["REPO"]

          token_resp = urllib.request.urlopen(urllib.request.Request(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              data=json.dumps({"app_id": app_id, "app_secret": app_secret}).encode(),
              headers={"Content-Type": "application/json"},
              method="POST"
          ))
          token = json.loads(token_resp.read())["tenant_access_token"]

          icon = "✅" if rerun_result == "success" else "❌"
          dry_tag = " [dry-run]" if dry_run == "true" else ""
          text = (
              f"{icon} MovieTrace 手动重跑{dry_tag}\n"
              f"stage={stage} days={days} → {rerun_result}\n"
              f"https://github.com/{repo}/actions/runs/{run_id}"
          )

          req = urllib.request.Request(
              "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id",
              data=json.dumps({"receive_id": chat_id, "msg_type": "text", "content": json.dumps({"text": text})}).encode(),
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {token}"},
              method="POST"
          )
          result = json.loads(urllib.request.urlopen(req).read())
          print(f"Feishu notify: code={result.get('code')} msg={result.get('msg')}")
          PYEOF
