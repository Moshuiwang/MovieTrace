# MovieTrace configuration
# Generated by P1.5-D, updated P1.8-H

baseline_tracking:
  enabled: true
  # routine mode uses status-filtered polling; catch-up mode ignores these coverage
  # windows and polls all non-skip virtual_series once.
  urgent_coverage_days: 14
  normal_coverage_days: 21
  low_coverage_days: 180
  daily_max_calls: 50
  api_interval_seconds: 1

source_fetch_limits:
  tmdb:
    pages_per_endpoint: 1
  trakt:
    shows_limit: 20
    movies_limit: 20

source_fallback:
  enabled: true
  max_staleness_days: 30
  sources:
    flixpatrol: true
    tmdb: true
    trakt: true

flixpatrol:
  countries:
    - world
    - united-states
    - nigeria
    - kenya
  platforms:
    - netflix
    - prime-video
    - disney-plus
    - apple-tv-plus
    - hbo-max
    - paramount-plus
  tv_fetch_daily: true
  movie_fetch_weekly: true
  movie_weekly_day: 0  # 0=Monday, 6=Sunday
