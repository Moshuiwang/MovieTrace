feishu_sync:
  enabled: true
  table_name: "每日发现"
  doc_folder_token: "VSVufHjq7lvIwYd7RdVcCdULnrh"
  # notify_user_open_id and gmail credentials go in secrets.json → feishu section

baseline_tracking:
  enabled: true
  # routine mode polls all Returning Series / In Production (or null status);
  # catch-up mode polls all non-skip virtual_series once.
  # daily_max_calls hard cap; 2000 is effectively no limit for current scale.
  daily_max_calls: 2000
  api_interval_seconds: 1

source_fetch_limits:
  tmdb:
    pages_per_endpoint: 1
  trakt:
    shows_limit: 20
    movies_limit: 20

source_fallback:
  enabled: true
  max_staleness_days: 30
  sources:
    flixpatrol: true
    tmdb: true
    trakt: true

flixpatrol:
  countries:
    - world
    - united-states
    - nigeria
    - kenya
  platforms:
    - netflix
    - prime-video
    - disney-plus
    - apple-tv-plus
    - hbo-max
    - paramount-plus
  tv_fetch_daily: true
  movie_fetch_weekly: true
  movie_weekly_day: 0  # 0=Monday, 6=Sunday
